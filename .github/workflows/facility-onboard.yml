name: Facility Onboard

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  onboard:
    if: github.event.label.name == 'facility-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function field(label) {
              const re = new RegExp('###\\s*' + label + '\\s*\\n+([\\s\\S]*?)(?=\\n###|$)');
              const m = body.match(re);
              return m ? m[1].trim().replace(/^_No response_$/i, '') : '';
            }

            const facility   = field('Facility Name');
            const institution = field('Institution / Organization');
            const machineType = field('Machine Type');
            const machineName = field('Machine Name / Identifier');
            const email       = field('Contact Email');
            const watchDir    = field('Watch Directory Path');
            const notes       = field('Notes');

            const slug = facility
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/(^-|-$)/g, '');

            core.setOutput('facility', facility);
            core.setOutput('institution', institution);
            core.setOutput('machine_type', machineType);
            core.setOutput('machine_name', machineName);
            core.setOutput('email', email);
            core.setOutput('watch_dir', watchDir);
            core.setOutput('notes', notes);
            core.setOutput('slug', slug);
            core.setOutput('upload_path', `data/${slug}/`);
            core.setOutput('requester', context.payload.issue.user.login);

      - name: Create facility directory
        run: |
          SLUG="${{ steps.parse.outputs.slug }}"
          DIR="data/${SLUG}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d "$DIR" ]; then
            echo "Directory $DIR already exists — skipping creation."
          else
            mkdir -p "$DIR"
            echo "# ${{ steps.parse.outputs.facility }}" > "${DIR}/README.md"
            echo "" >> "${DIR}/README.md"
            echo "Facility data directory. Files pushed here by the Rosetta Edge Watchdog" >> "${DIR}/README.md"
            echo "are automatically parsed and aggregated by GitHub Actions." >> "${DIR}/README.md"
            git add "$DIR"
            git commit -m "Initialize facility directory: ${DIR} [skip ci]"
            git push origin main
            echo "Created directory $DIR"
          fi

      - name: Add facility to users.csv
        run: |
          FOLDER="${{ steps.parse.outputs.facility }}"
          USER="${{ steps.parse.outputs.requester }}"
          EMAIL="${{ steps.parse.outputs.email }}"

          if grep -qF "$FOLDER" users.csv 2>/dev/null; then
            echo "Facility folder already in users.csv — skipping."
          else
            # Strip trailing blank lines, append entry, add final newline
            sed -i -e :a -e '/^\n*$/{$d;N;ba;}' users.csv
            echo "${FOLDER},${USER},${EMAIL}" >> users.csv
            echo "" >> users.csv
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add users.csv
            git commit -m "Add facility ${FOLDER} to users.csv [skip ci]"
            git push origin main
            echo "Added $FOLDER to users.csv"
          fi

      - name: Comment on issue with next steps
        uses: actions/github-script@v7
        with:
          script: |
            const facility    = `${{ steps.parse.outputs.facility }}`;
            const slug        = `${{ steps.parse.outputs.slug }}`;
            const uploadPath  = `${{ steps.parse.outputs.upload_path }}`;
            const machineName = `${{ steps.parse.outputs.machine_name }}` || slug;
            const watchDir    = `${{ steps.parse.outputs.watch_dir }}` || 'D:\\\\XradiaData\\\\Scans';

            const body = [
              `## Facility Approved`,
              ``,
              `Your facility **${facility}** has been approved and the directory \`${uploadPath}\` is ready on \`main\`.`,
              ``,
              `### Next steps — install the Rosetta Edge Watchdog`,
              ``,
              `\`\`\`bash`,
              `git clone https://github.com/${context.repo.owner}/${context.repo.repo}.git`,
              `cd ${context.repo.repo}/edge`,
              `pip install -e .`,
              `cp config.example.yml config.yml`,
              `\`\`\``,
              ``,
              `Edit \`config.yml\`:`,
              ``,
              `\`\`\`yaml`,
              `watch_directories:`,
              `  - path: "${watchDir}"`,
              `    machine_name: "${machineName}"`,
              ``,
              `github:`,
              `  token_env: "ROSETTA_GITHUB_TOKEN"`,
              `  repo: "${context.repo.owner}/${context.repo.repo}"`,
              `  branch: "main"`,
              `  upload_path: "${uploadPath}"`,
              `  commit_prefix: "[edge-watchdog]"`,
              `\`\`\``,
              ``,
              `Then run:`,
              ``,
              `\`\`\`bash`,
              `export ROSETTA_GITHUB_TOKEN="ghp_..."`,
              `rosetta-watchdog -c config.yml`,
              `\`\`\``,
              ``,
              `Once data appears in \`${uploadPath}\`, your facility is live!`,
              ``,
              `> You can also complete the remaining steps interactively at`,
              `> **https://${context.repo.owner}.github.io/${context.repo.repo}/docs/setup-facility/**`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['facility-ready'],
            });
