name: Facility Onboard

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  onboard:
    if: github.event.label.name == 'facility-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function field(label) {
              const re = new RegExp('###\\s*' + label + '\\s*\\n+([\\s\\S]*?)(?=\\n###|$)');
              const m = body.match(re);
              return m ? m[1].trim().replace(/^_No response_$/i, '') : '';
            }

            const facility    = field('Facility Name');
            const institution = field('Institution / Organization');
            const email       = field('Contact Email');
            const notes       = field('Notes');

            const slug = facility
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/(^-|-$)/g, '');

            // Parse machines from markdown table
            const machinesRaw = field('X-ray Machines');
            const machines = [];
            const rows = machinesRaw.split('\n').filter(r => r.trim().startsWith('|'));
            for (const row of rows) {
              const cells = row.split('|').map(c => c.trim()).filter(c => c);
              if (cells.length >= 3 && !cells[0].startsWith('-') && cells[0] !== 'Format') {
                machines.push({ format: cells[0], name: cells[1], path: cells[2] });
              }
            }

            // Fallback for old-style issues without machine table
            if (machines.length === 0) {
              const machineName = field('Machine Name / Identifier') || slug;
              const watchDir = field('Watch Directory Path') || 'D:/XradiaData/Scans';
              machines.push({ format: '.txrm', name: machineName, path: watchDir });
            }

            core.setOutput('facility', facility);
            core.setOutput('institution', institution);
            core.setOutput('email', email);
            core.setOutput('notes', notes);
            core.setOutput('slug', slug);
            core.setOutput('upload_path', `data/${slug}/`);
            core.setOutput('requester', context.payload.issue.user.login);
            core.setOutput('machines_json', JSON.stringify(machines));

      - name: Create facility directory and config
        env:
          MACHINES_JSON: ${{ steps.parse.outputs.machines_json }}
        run: |
          SLUG="${{ steps.parse.outputs.slug }}"
          DIR="data/${SLUG}"
          UPLOAD_PATH="${{ steps.parse.outputs.upload_path }}"
          FACILITY="${{ steps.parse.outputs.facility }}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "$DIR"

          # Generate config.yml via Python to avoid bash heredoc escaping issues
          python3 - "$DIR" "$FACILITY" "$UPLOAD_PATH" <<'PYSCRIPT'
          import json, os, sys

          dir_path, facility, upload_path = sys.argv[1], sys.argv[2], sys.argv[3]
          machines = json.loads(os.environ["MACHINES_JSON"])

          lines = [
              f"# Rosetta Edge Watchdog config for: {facility}",
              "# Auto-generated by facility onboard workflow",
              "",
              "watch_directories:",
          ]
          for m in machines:
              safe_path = m["path"].replace("\\", "/")
              lines.append(f'  - path: "{safe_path}"')
              lines.append(f'    machine_name: "{m["name"]}"')
          lines.extend([
              "",
              "polling_interval_seconds: 30",
              "include_drift_files: false",
              'parser_backend: "auto"',
              'state_file: "processed_files.json"',
              "",
              "github:",
              '  token_env: "ROSETTA_GITHUB_TOKEN"',
              '  repo: "johntrue15/Rosetta"',
              '  branch: "main"',
              f'  upload_path: "{upload_path}"',
              '  commit_prefix: "[edge-watchdog]"',
              "",
              "logging:",
              '  level: "INFO"',
              '  file: "rosetta-watchdog.log"',
          ])

          with open(os.path.join(dir_path, "config.yml"), "w") as f:
              f.write("\n".join(lines) + "\n")
          PYSCRIPT

          # Generate README
          echo "# ${FACILITY}" > "${DIR}/README.md"
          echo "" >> "${DIR}/README.md"
          echo "Facility data directory. Files pushed here by the Rosetta Edge Watchdog" >> "${DIR}/README.md"
          echo "are automatically parsed and aggregated by GitHub Actions." >> "${DIR}/README.md"

          git add "$DIR"
          git commit -m "Initialize facility: ${DIR} with config.yml [skip ci]"
          git push origin main
          echo "Created $DIR with config.yml"

      - name: Add facility to users.csv
        run: |
          FOLDER="${{ steps.parse.outputs.facility }}"
          USER="${{ steps.parse.outputs.requester }}"
          EMAIL="${{ steps.parse.outputs.email }}"

          if grep -qF "$FOLDER" users.csv 2>/dev/null; then
            echo "Facility folder already in users.csv — skipping."
          else
            sed -i -e :a -e '/^\n*$/{$d;N;ba;}' users.csv
            echo "${FOLDER},${USER},${EMAIL}" >> users.csv
            echo "" >> users.csv
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add users.csv
            git commit -m "Add facility ${FOLDER} to users.csv [skip ci]"
            git push origin main
            echo "Added $FOLDER to users.csv"
          fi

      - name: Request companion repo from Rosetta Upload Worker
        id: companion
        env:
          ROSETTA_WORKER_URL: ${{ secrets.ROSETTA_WORKER_URL }}
          ONBOARD_HMAC_KEY:   ${{ secrets.ROSETTA_ONBOARD_HMAC_KEY }}
          SLUG:               ${{ steps.parse.outputs.slug }}
          FACILITY:           ${{ steps.parse.outputs.facility }}
        run: |
          python3 - <<'PYEOF'
          import hmac, hashlib, json, os, sys, time, urllib.request, urllib.error

          worker = os.environ.get("ROSETTA_WORKER_URL", "").rstrip("/")
          key    = os.environ.get("ONBOARD_HMAC_KEY", "")
          slug   = os.environ.get("SLUG", "")
          fac    = os.environ.get("FACILITY", "")
          gh_out = os.environ.get("GITHUB_OUTPUT")

          def out(name, value):
              if gh_out:
                  with open(gh_out, "a") as f:
                      f.write(f"{name}={value}\n")

          if not worker or not key:
              print("::warning::ROSETTA_WORKER_URL or ROSETTA_ONBOARD_HMAC_KEY not configured -- skipping companion repo creation. The wizard will create the companion repo on demand.")
              out("ok", "false")
              sys.exit(0)

          body = {"slug": slug, "facility": fac, "issued_at": int(time.time())}
          canonical = json.dumps(body, separators=(",", ":"))
          sig = hmac.new(key.encode("utf-8"), canonical.encode("utf-8"), hashlib.sha256).hexdigest()
          payload = dict(body, onboard_signature=sig)

          req = urllib.request.Request(
              f"{worker}/facility/create-companion-repo",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
                  print("Worker response:", data)
                  out("ok", "true")
                  out("repo", data.get("companion_repo", ""))
          except urllib.error.HTTPError as e:
              detail = e.read().decode("utf-8", "ignore")
              print(f"::warning::Companion repo creation returned HTTP {e.code}: {detail} -- the wizard will create it on demand.")
              out("ok", "false")
          except Exception as e:
              print(f"::warning::Companion repo creation failed: {e} -- the wizard will create it on demand.")
              out("ok", "false")
          PYEOF

      - name: Comment on issue with next steps
        uses: actions/github-script@v7
        env:
          COMPANION_OK:   ${{ steps.companion.outputs.ok }}
          COMPANION_REPO: ${{ steps.companion.outputs.repo }}
          MACHINES_JSON:  ${{ steps.parse.outputs.machines_json }}
        with:
          script: |
            const facility   = `${{ steps.parse.outputs.facility }}`;
            const slug       = `${{ steps.parse.outputs.slug }}`;
            const uploadPath = `${{ steps.parse.outputs.upload_path }}`;
            const machines   = JSON.parse(process.env.MACHINES_JSON);
            const companionOk   = process.env.COMPANION_OK === 'true';
            const companionRepo = process.env.COMPANION_REPO || `x-raymetadata/rosetta-facility-${slug}`;

            const machineList = machines.map(m => `- **${m.name}** (${m.format}) → \`${m.path}\``).join('\n');
            const wizardUrl   = `https://${context.repo.owner}.github.io/${context.repo.repo}/docs/setup-facility/`;

            const body = [
              `## Facility Approved`,
              ``,
              `Your facility **${facility}** has been approved!`,
              `Directory \`${uploadPath}\` and \`config.yml\` are in place.`,
              ``,
              `**Machines configured:**`,
              machineList,
              ``,
              `### Install the watchdog (no PAT required)`,
              ``,
              `1. Go to the setup wizard: **[${wizardUrl}](${wizardUrl})**`,
              `2. The wizard jumps straight to **Step 3 — Install** for facility \`${slug}\`.`,
              `3. Approve the **Rosetta Upload** GitHub App via the short device code shown on screen.`,
              `4. Click **Download installer**, then run the single command it shows on the CT machine.`,
              ``,
              `The installer downloads the watchdog, installs Python automatically if missing`,
              `(Windows, no admin), writes your config, and starts monitoring your scan folder.`,
              `Scan metadata is pushed to your private companion repo`,
              companionOk
                ? `\`${companionRepo}\` (already created for you).`
                : `\`${companionRepo}\` (the wizard will create it on first visit).`,
              ``,
              `> No personal access token. No \`git clone\`. No self-hosted runner required.`,
              `> All credentials are scoped, rotating App installation tokens issued by the Rosetta Upload Worker.`,
              `>`,
              `> _Advanced:_ the wizard also offers a self-hosted-runner option that installs the watchdog as an auto-start service (requires an administrator terminal).`,
              ``,
              `<details><summary>Legacy manual install (still supported)</summary>`,
              ``,
              `If you prefer to skip the runner and run the watchdog yourself with a PAT, the legacy instructions remain in [edge/README.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/edge/README.md).`,
              ``,
              `</details>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['facility-ready'],
            });
