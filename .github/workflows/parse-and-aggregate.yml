name: Parse & Aggregate Data

on:
  push:
    paths:
      - "data/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parse-and-aggregate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  parse:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install striprtf
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Ensure output folders exist
        run: |
          mkdir -p data/parsed
          mkdir -p data/completed

      - name: Determine changed source files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            git ls-files 'data/**' \
            | grep -v -E '\.json$' \
            | grep -v -E '\.csv$' \
            | grep -v -E '^data/parsed/' \
            | grep -v -E '^data/completed/' \
            | grep -v -E '^data/tests/' \
            > changed.txt || true
          else
            git diff --name-only "${BEFORE}" "${{ github.sha }}" -- 'data/**' \
            | grep -v -E '\.json$' \
            | grep -v -E '\.csv$' \
            | grep -v -E '^data/parsed/' \
            | grep -v -E '^data/completed/' \
            | grep -v -E '^data/tests/' \
            > changed.txt || true
          fi

          echo "Changed candidate files:"
          cat changed.txt || true
          echo "list=$(pwd)/changed.txt" >> "$GITHUB_OUTPUT"

      - name: Parse changed files → JSON (via scripts/parse_any.py)
        if: ${{ always() && steps.changed.outputs.list != '' }}
        shell: bash
        run: |
          set -euo pipefail
          LIST_FILE="${{ steps.changed.outputs.list }}"

          if [ ! -s "$LIST_FILE" ]; then
            echo "No source files to parse."
            exit 0
          fi

          while IFS= read -r f; do
            [ -z "${f:-}" ] && continue
            [ ! -f "$f" ] && continue
            echo "Parsing: $f"

            # Extract uploader identity from the commit that added this file.
            # For web UI uploads the commit is authored by the GitHub user;
            # the commit message also contains [uploader:<login>].
            UPLOADER=""
            COMMIT_MSG=$(git log -1 --format='%s' -- "$f" 2>/dev/null || true)
            if echo "$COMMIT_MSG" | grep -qoP '\[uploader:\K[^\]]+'; then
              UPLOADER=$(echo "$COMMIT_MSG" | grep -oP '\[uploader:\K[^\]]+')
            fi
            if [ -z "$UPLOADER" ]; then
              UPLOADER=$(git log -1 --format='%an' -- "$f" 2>/dev/null || true)
            fi

            UPLOADER_FLAG=""
            if [ -n "$UPLOADER" ] && [ "$UPLOADER" != "github-actions[bot]" ]; then
              UPLOADER_FLAG="--uploaded-by $UPLOADER"
            fi

            python scripts/parse_any.py "$f" \
              -o data/parsed \
              --completed-dir data/completed \
              --pretty \
              $UPLOADER_FLAG
          done < "$LIST_FILE"

          # Safety cleanup: remove any leftover metadata sources outside parsed/completed/tests
          find data -type f \
            ! -path "data/parsed/*" \
            ! -path "data/completed/*" \
            ! -path "data/tests/*" \
            \( -iname "*.rtf" -o -iname "*.pca" -o -iname "*.xtekct" -o -iname "*.xml" -o -iname "*.log" -o -iname "*.txrm" \) \
            -print -exec rm -f {} +

      - name: Build upload-only metadata JSON
        shell: bash
        run: |
          set -euo pipefail
          LIST_FILE="${{ steps.changed.outputs.list }}"
          python3 -c "
          import json, os, sys
          list_file = os.environ['LIST_FILE']
          records = []
          if os.path.isfile(list_file):
              with open(list_file) as f:
                  for line in f:
                      src = line.strip()
                      if not src:
                          continue
                      parsed = os.path.join('data', 'parsed', os.path.basename(src) + '.json')
                      if os.path.isfile(parsed):
                          with open(parsed, 'r', encoding='utf-8') as pf:
                              data = json.load(pf)
                          if isinstance(data, list):
                              records.extend(data)
                          elif isinstance(data, dict):
                              records.append(data)
          with open('upload-metadata.json', 'w', encoding='utf-8') as out:
              json.dump(records, out, ensure_ascii=False, indent=2)
          print(f'Collected {len(records)} upload-only records')
          "
        env:
          LIST_FILE: ${{ steps.changed.outputs.list }}

      - name: Convert upload-only JSON to CSV
        if: ${{ hashFiles('upload-metadata.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/metadata_to_csv.py \
            --input upload-metadata.json \
            --output upload-metadata.csv
          echo "Generated upload-metadata.csv"

      - name: Aggregate & de-duplicate metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/aggregate_json.py ]; then
            # Use script defaults (writes to data/metadata.json)
            python scripts/aggregate_json.py
          else
            echo "scripts/aggregate_json.py not found!" >&2
            exit 1
          fi

      - name: Convert metadata.json to metadata.csv
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/metadata_to_csv.py ]; then
            python scripts/metadata_to_csv.py
            echo "Generated metadata.csv"
          else
            echo "scripts/metadata_to_csv.py not found!" >&2
            exit 1
          fi

      - name: Upload combined CSV as artifact
        if: ${{ hashFiles('data/metadata.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: combined-metadata-csv
          path: data/metadata.csv
          retention-days: 60

      - name: Upload upload-only CSV as artifact
        if: ${{ hashFiles('upload-metadata.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: upload-metadata-csv
          path: upload-metadata.csv
          retention-days: 60

      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Parse & aggregate data [skip ci]"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling with rebase..."
            git pull --rebase origin "$GITHUB_REF_NAME"
          done
          echo "Failed after $MAX_RETRIES attempts"
          exit 1
