name: Facility Request
description: Request onboarding for a new CT scanner facility
title: "Facility request: "
labels: ["request-facility"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for setting up a new facility! Fill in the details below and a
        maintainer will review your request. Once approved, a `config.yml` will
        be generated and you'll be guided through installing the Rosetta Edge Watchdog.

  - type: input
    id: facility_name
    attributes:
      label: Facility Name
      description: A short, unique name for this facility (used in directory names and config).
      placeholder: e.g. AMNH-Xradia520
    validations:
      required: true

  - type: input
    id: institution
    attributes:
      label: Institution / Organization
      placeholder: e.g. American Museum of Natural History

  - type: input
    id: contact_email
    attributes:
      label: Contact Email
      placeholder: e.g. scientist@institution.edu

  - type: textarea
    id: machines
    attributes:
      label: X-ray Machines
      description: |
        List each machine on its own line: file format, machine name, watch folder path.
        Use this markdown table format (keep the header row).
      value: |
        | Format | Machine Name | Watch Path |
        |--------|-------------|------------|
        | .txrm | Xradia-520-Versa | D:\XradiaData\Scans |
        | .pca | Phoenix-v2 | D:\CT_Output |
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any additional context — justification, special requirements, etc.
