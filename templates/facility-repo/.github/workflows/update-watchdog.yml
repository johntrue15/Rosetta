name: Update Rosetta Watchdog
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

# Reference copy. Keep in sync with `updateWorkflowYaml()` in
# cloudflare/worker.js. The self-hosted runner picks up its own updates
# from actions/runner automatically; this workflow only re-runs the
# deploy job so the watchdog code stays current with johntrue15/Rosetta.

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy-watchdog
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-watchdog.yml',
              ref: 'main',
              inputs: { ref: 'main' },
            });
