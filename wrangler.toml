name = "rosetta"
main = "cloudflare/worker.js"
compatibility_date = "2024-01-01"

# account_id is read from CLOUDFLARE_ACCOUNT_ID (cloudflare/credentials.env)
# or set explicitly: account_id = "your_account_id"

[vars]
ALLOWED_ORIGIN = "https://johntrue15.github.io"

# Fleet monitoring (Phases 1-4). The Worker stores the latest watchdog
# heartbeat, queued commands, channels, revocations, and audit log per facility
# in this KV namespace; the dashboard reads it back.
#
# One-time setup — automated (creates the namespace, writes the binding here,
# and deploys):
#   npm run worker:kv-setup
#
# ...or manual:
#   npx wrangler kv namespace create FLEET
# then uncomment the block below and paste the printed id. The fleet endpoints
# degrade gracefully (no-op) until this is configured, so deploying before
# creating the namespace will not break the other routes.
#
# [[kv_namespaces]]
# binding = "FLEET"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Stale-facility detection runs on a schedule and flags facilities whose
# watchdog has gone silent. Harmless (no-op) until FLEET KV is configured.
[triggers]
crons = ["*/15 * * * *"]
