name = "rosetta"
main = "cloudflare/worker.js"
compatibility_date = "2024-01-01"

# account_id is read from CLOUDFLARE_ACCOUNT_ID (cloudflare/credentials.env)
# or set explicitly: account_id = "your_account_id"

[vars]
ALLOWED_ORIGIN = "https://johntrue15.github.io"

# Stale-facility detection runs on a schedule and flags facilities whose
# watchdog has gone silent.
[triggers]
crons = ["*/15 * * * *"]

# Fleet monitoring KV (Phases 1-4): latest heartbeat, queued commands, channels,
# revocations, and audit log per facility. The dashboard reads it back.
#
# Created + bound + deployed once by the maintainer (not per install):
#   npm run worker:setup     # node-only, no wrangler/npx needed (REST API)
#   npm run worker:kv-setup  # wrangler-based equivalent
[[kv_namespaces]]
binding = "FLEET"
id = "88c034b95ffd4e1fac3c2c50bc6aa286"
