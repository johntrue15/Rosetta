<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in… – Rosetta</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --danger: #f85149;
      --surface: #161b22;
      --border: #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-top: 0.5rem; }
    .success { color: var(--success); }
    .error { color: var(--danger); }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.25rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🪨</div>
    <h2 id="title">Completing sign-in…</h2>
    <p id="message">Finishing authorization with GitHub.</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
    const title   = document.getElementById("title");
    const message = document.getElementById("message");
    const spinner = document.getElementById("spinner");

    (function () {
      /* The Cloudflare Worker redirects here with #token=<access_token>
         Hash fragments are never sent to the server — the token stays client-side. */
      const hash   = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const token  = params.get("token");

      /* Clear the hash from the URL immediately */
      if (window.history.replaceState) {
        window.history.replaceState(null, "", window.location.pathname);
      }

      if (!token) {
        spinner.style.display = "none";
        title.textContent   = "Sign-in failed";
        title.className     = "error";
        message.textContent = "No token received. Please close this window and try again.";
        return;
      }

      /* Write token to localStorage (same origin as the main Rosetta page) */
      localStorage.setItem("gh_token", token);

      spinner.style.display = "none";
      title.textContent   = "Authorized!";
      title.className     = "success";
      message.textContent = "Closing this window…";

      /* Notify the opener if it exists */
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.dispatchEvent(new Event("gh_token_ready"));
        }
      } catch (e) { /* cross-origin — the poll in the main page will pick it up */ }

      /* Close the popup after a brief moment */
      setTimeout(function () { window.close(); }, 500);
    })();
  </script>
</body>
</html>
