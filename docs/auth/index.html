<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in… – Rosetta</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --danger: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    p  { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-top: 0.5rem; }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.25rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
    #error-box {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem;
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 6px;
      color: var(--danger);
      font-size: 0.82rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🪨</div>
    <h2>Completing sign-in…</h2>
    <p>You are being authenticated with GitHub.<br />This window will close automatically.</p>
    <div class="spinner" id="spinner"></div>
    <div id="status">Exchanging authorization code…</div>
    <div id="error-box"></div>
  </div>

  <script>
    /**
     * This page is the GitHub OAuth callback.
     * GitHub redirects here with ?code=xxx&state=xxx
     * We immediately forward the full URL to the Cloudflare Worker,
     * which does the server-side code→token exchange and writes
     * the token to window.opener's localStorage.
     *
     * If the page was opened as a popup the Worker's response
     * script closes it. If opened as a redirect (no opener),
     * we redirect back to the main page with the token in
     * sessionStorage instead.
     */

    const WORKER_URL = "https://rosetta.jtrue15.workers.dev";

    (async () => {
      const status   = document.getElementById("status");
      const errorBox = document.getElementById("error-box");
      const spinner  = document.getElementById("spinner");

      const params = new URLSearchParams(window.location.search);
      const code   = params.get("code");
      const state  = params.get("state");

      if (!code) {
        showError("No authorization code received. Please close this window and try again.");
        return;
      }

      // Redirect to Worker — it handles the exchange and writes to localStorage
      status.textContent = "Redirecting to token exchange…";
      const workerUrl = WORKER_URL + "?code=" + encodeURIComponent(code) + "&state=" + encodeURIComponent(state ?? "");
      window.location.href = workerUrl;
    })();

    function showError(msg) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("status").style.display  = "none";
      const box = document.getElementById("error-box");
      box.style.display = "";
      box.textContent   = msg;
    }
  </script>
</body>
</html>
