<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosetta Fleet &mdash; Watchdog Status</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2230;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --ok: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.25rem; margin: 0; }
    header .sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.15rem; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    button {
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 0.55rem 0.95rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    button:disabled { opacity: 0.5; cursor: default; }
    code { background: var(--panel-2); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85em; }
    a { color: var(--accent); }

    .signin {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 560px;
      margin: 2rem auto;
    }
    .code-box {
      font-size: 1.8rem;
      letter-spacing: 0.3rem;
      font-weight: 700;
      background: var(--panel-2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-align: center;
      margin: 0.75rem 0;
    }
    .muted { color: var(--muted); }

    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar .summary { color: var(--muted); font-size: 0.9rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }
    .card.online { border-left: 4px solid var(--ok); }
    .card.stale { border-left: 4px solid var(--danger); }
    .card.stopped { border-left: 4px solid var(--warn); }
    .card h3 { margin: 0 0 0.1rem; font-size: 1.05rem; }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
    }
    .badge.online { background: rgba(63,185,80,0.15); color: var(--ok); }
    .badge.stale { background: rgba(248,81,73,0.15); color: var(--danger); }
    .badge.stopped { background: rgba(210,153,34,0.15); color: var(--warn); }
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 0.2rem 0.75rem; margin-top: 0.6rem; font-size: 0.88rem; }
    .kv .k { color: var(--muted); }
    .dirs { margin-top: 0.6rem; font-size: 0.82rem; }
    .dirs .d { display: flex; align-items: center; gap: 0.4rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .dot.ok { background: var(--ok); }
    .dot.bad { background: var(--danger); }
    .actions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.7rem; align-items: center; }
    .mini { padding: 0.3rem 0.6rem; font-size: 0.78rem; border-radius: 5px; }
    .mini.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    .mini.danger { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.4); }
    .mini-select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 0.28rem 0.4rem; font-size: 0.78rem; }
    .warn-row { color: var(--danger); font-size: 0.8rem; margin-top: 0.4rem; }
    .audit { margin-top: 0.7rem; border-top: 1px solid var(--border); padding-top: 0.5rem; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
    .audit-row { padding: 0.15rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Rosetta Fleet</h1>
      <div class="sub">Watchdog status across approved facilities</div>
    </div>
    <div id="header-actions"></div>
  </header>

  <div class="wrap">
    <!-- Sign-in panel -->
    <div id="signin" class="signin">
      <h2 style="margin-top:0">Sign in</h2>
      <p class="muted">
        The fleet dashboard is restricted to members of the
        <code id="org-name">x-raymetadata</code> organization. Authorize with GitHub to continue.
      </p>
      <div id="device-area" style="display:none">
        <p>Open <a id="device-link" target="_blank" rel="noopener">github.com/login/device</a> and enter this code:</p>
        <div class="code-box" id="user-code">&mdash;</div>
        <div id="device-status" class="muted"></div>
      </div>
      <button id="signin-btn" onclick="startDeviceFlow()">Authorize with GitHub</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none">
      <div class="toolbar">
        <button class="secondary" onclick="refresh()">Refresh</button>
        <label class="muted" style="font-size:0.9rem"><input type="checkbox" id="auto" checked /> Auto-refresh (30s)</label>
        <span class="summary" id="summary"></span>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://rosetta.jtrue15.workers.dev";
    const ORG = "x-raymetadata";
    const REFRESH_MS = 30000;

    let deviceState = null;
    let pollTimer = null;
    let refreshTimer = null;
    let userToken = sessionStorage.getItem("rosetta_fleet_token") || null;

    document.getElementById("org-name").textContent = ORG;

    function fmtAge(seconds) {
      if (seconds == null) return "never";
      if (seconds < 60) return seconds + "s ago";
      if (seconds < 3600) return Math.round(seconds / 60) + "m ago";
      if (seconds < 86400) return Math.round(seconds / 3600) + "h ago";
      return Math.round(seconds / 86400) + "d ago";
    }
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]
      ));
    }

    async function startDeviceFlow() {
      const btn = document.getElementById("signin-btn");
      btn.disabled = true;
      const statusEl = document.getElementById("device-status");
      document.getElementById("device-area").style.display = "block";
      statusEl.innerHTML = '<span class="spinner"></span> Requesting device code&hellip;';
      try {
        const res = await fetch(WORKER_URL + "/device/init", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ scope: "read:org" }),
        });
        if (!res.ok) throw new Error("init failed: " + res.status);
        deviceState = await res.json();
      } catch (err) {
        statusEl.innerHTML = '<span class="error">Failed to start: ' + esc(err.message) + '</span>';
        btn.disabled = false;
        return;
      }
      document.getElementById("user-code").textContent = deviceState.user_code;
      const link = document.getElementById("device-link");
      link.href = deviceState.verification_uri || "https://github.com/login/device";
      try { const p = window.open(link.href, "rosetta_device", "width=600,height=720"); if (p) p.focus(); } catch (e) {}
      pollDeviceFlow();
    }

    async function pollDeviceFlow() {
      if (!deviceState) return;
      const statusEl = document.getElementById("device-status");
      const interval = Math.max(5, deviceState.interval || 5) * 1000;
      try {
        const res = await fetch(WORKER_URL + "/device/poll", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ device_code: deviceState.device_code }),
        });
        const data = await res.json();
        if (data.access_token) {
          userToken = data.access_token;
          sessionStorage.setItem("rosetta_fleet_token", userToken);
          showDashboard();
          return;
        }
        if (data.error === "authorization_pending") {
          statusEl.innerHTML = '<span class="spinner"></span> Waiting for code <code>' + esc(deviceState.user_code) + '</code>&hellip;';
        } else if (data.error === "slow_down") {
          statusEl.innerHTML = '<span class="spinner"></span> Throttled by GitHub&hellip;';
        } else if (data.error) {
          statusEl.innerHTML = '<span class="error">' + esc(data.error_description || data.error) + '</span>';
          document.getElementById("signin-btn").disabled = false;
          return;
        }
      } catch (err) {
        statusEl.innerHTML = '<span class="error">Polling error: ' + esc(err.message) + '</span>';
      }
      pollTimer = setTimeout(pollDeviceFlow, interval);
    }

    function signOut() {
      userToken = null;
      sessionStorage.removeItem("rosetta_fleet_token");
      if (refreshTimer) clearTimeout(refreshTimer);
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("signin").style.display = "block";
      document.getElementById("signin-btn").disabled = false;
      document.getElementById("device-area").style.display = "none";
      document.getElementById("header-actions").innerHTML = "";
    }

    function showDashboard() {
      if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
      document.getElementById("signin").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("header-actions").innerHTML =
        '<button class="secondary" onclick="signOut()">Sign out</button>';
      refresh();
    }

    async function refresh() {
      if (!userToken) return;
      const content = document.getElementById("content");
      const summary = document.getElementById("summary");
      summary.innerHTML = '<span class="spinner"></span> Loading&hellip;';
      let data;
      try {
        const res = await fetch(WORKER_URL + "/fleet/status", {
          headers: { Authorization: "Bearer " + userToken },
        });
        if (res.status === 401 || res.status === 403) {
          const err = await res.json().catch(() => ({}));
          summary.textContent = "";
          content.innerHTML = '<div class="empty error">Access denied (' +
            esc(err.error || res.status) + '). You must be an active member of the <code>' +
            esc(ORG) + '</code> org, and the token needs the <code>read:org</code> scope. Try signing out and back in.</div>';
          return;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);
        data = await res.json();
      } catch (err) {
        summary.textContent = "";
        content.innerHTML = '<div class="empty error">Failed to load: ' + esc(err.message) + '</div>';
        scheduleRefresh();
        return;
      }
      render(data);
      scheduleRefresh();
    }

    function scheduleRefresh() {
      if (refreshTimer) clearTimeout(refreshTimer);
      if (document.getElementById("auto").checked) {
        refreshTimer = setTimeout(refresh, REFRESH_MS);
      }
    }

    async function api(path, opts) {
      const res = await fetch(WORKER_URL + path, Object.assign({
        headers: { Authorization: "Bearer " + userToken, "Content-Type": "application/json" },
      }, opts || {}));
      let data = {};
      try { data = await res.json(); } catch (e) {}
      if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
      return data;
    }

    async function sendCommand(slug, type, args) {
      const labels = { "update-now": "update", "restart": "restart" };
      if (labels[type] && !confirm("Send '" + type + "' to " + slug + "?")) return;
      try {
        await api("/fleet/command", { method: "POST", body: JSON.stringify({ slug, type, args }) });
        toast(slug + ": queued '" + type + "'");
        refresh();
      } catch (e) { toast(slug + ": " + e.message, true); }
    }

    async function setChannel(slug) {
      const sel = document.getElementById("ch-" + slug);
      const channel = sel.value;
      let pin = null;
      if (channel === "pinned") {
        pin = prompt("Pin to which release tag? (e.g. watchdog-v0.2.0)");
        if (!pin) return;
      }
      try {
        await api("/fleet/set-channel", { method: "POST", body: JSON.stringify({ slug, channel, pin_version: pin }) });
        toast(slug + ": channel → " + channel + (pin ? " (" + pin + ")" : ""));
        refresh();
      } catch (e) { toast(slug + ": " + e.message, true); }
    }

    async function revoke(slug, on) {
      if (on && !confirm("Revoke the install ticket for " + slug + "?\nIts watchdog will lose access until you restore it and reinstall.")) return;
      try {
        await api(on ? "/fleet/revoke" : "/fleet/unrevoke", { method: "POST", body: JSON.stringify({ slug }) });
        toast(slug + (on ? ": ticket REVOKED" : ": ticket restored"));
      } catch (e) { toast(slug + ": " + e.message, true); }
    }

    async function toggleAudit(slug) {
      const box = document.getElementById("audit-" + slug);
      if (box.style.display === "block") { box.style.display = "none"; return; }
      box.style.display = "block";
      box.innerHTML = '<span class="spinner"></span> Loading audit&hellip;';
      try {
        const data = await api("/fleet/audit?slug=" + encodeURIComponent(slug));
        const events = data.events || [];
        box.innerHTML = events.length
          ? events.map((e) => '<div class="audit-row"><span class="muted">' +
              esc(new Date(e.ts).toLocaleString()) + '</span> ' + esc(e.type) +
              (e.by ? ' <span class="muted">by ' + esc(e.by) + '</span>' : '') +
              (e.command ? ' <code>' + esc(e.command) + '</code>' : '') + '</div>').join("")
          : '<div class="muted">No events recorded.</div>';
      } catch (e) { box.innerHTML = '<span class="error">' + esc(e.message) + '</span>'; }
    }

    let toastTimer = null;
    function toast(msg, isError) {
      let el = document.getElementById("toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "toast";
        el.style.cssText = "position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 1rem;z-index:50;max-width:90vw";
        document.body.appendChild(el);
      }
      el.style.color = isError ? "var(--danger)" : "var(--text)";
      el.textContent = msg;
      el.style.display = "block";
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.style.display = "none"; }, 4000);
    }

    function render(data) {
      const facilities = data.facilities || [];
      const summary = document.getElementById("summary");
      const content = document.getElementById("content");

      if (data.kv_configured === false) {
        content.innerHTML = '<div class="empty">Fleet KV storage is not configured on the Worker yet.<br>' +
          'Run <code>npx wrangler kv namespace create FLEET</code>, add the binding to <code>wrangler.toml</code>, and redeploy.</div>';
        summary.textContent = "";
        return;
      }
      if (!facilities.length) {
        content.innerHTML = '<div class="empty">No heartbeats received yet. Once a facility watchdog runs with monitoring enabled, it will appear here.</div>';
        summary.textContent = "";
        return;
      }

      const online = facilities.filter((f) => f.health === "online").length;
      const stale = facilities.filter((f) => f.health === "stale").length;
      const stopped = facilities.filter((f) => f.health === "stopped").length;
      summary.textContent =
        facilities.length + " facilities · " + online + " online · " +
        stale + " stale · " + stopped + " stopped · updated " +
        new Date(data.generated_at).toLocaleTimeString();

      const cards = facilities.map((f) => {
        const s = f.status || {};
        const dirs = (s.watch_dirs || []).map((d) =>
          '<div class="d"><span class="dot ' + (d.ok ? "ok" : "bad") + '"></span>' +
          '<span>' + esc(d.path) + (d.ok ? "" : " (not found)") + '</span></div>'
        ).join("") || '<span class="muted">none reported</span>';

        const slug = f.slug;
        const channels = ["stable", "beta", "pinned"];
        const chOptions = channels.map((c) =>
          '<option value="' + c + '"' + (f.channel === c ? " selected" : "") + '>' + c + '</option>'
        ).join("");
        const bindingWarn = f.binding === "conflict"
          ? '<div class="warn-row">&#9888; Ticket seen from a different machine (possible leak)</div>' : '';

        return '' +
          '<div class="card ' + esc(f.health) + '">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:0.5rem">' +
              '<h3>' + esc(slug) + '</h3>' +
              '<span class="badge ' + esc(f.health) + '">' + esc(f.health) + '</span>' +
            '</div>' +
            '<div class="muted" style="font-size:0.85rem">' + esc(s.hostname || "unknown host") + '</div>' +
            bindingWarn +
            '<div class="kv">' +
              '<span class="k">Last seen</span><span>' + esc(fmtAge(f.age_seconds)) + '</span>' +
              '<span class="k">Version</span><span>' + esc(s.version || "?") +
                ' <span class="muted">(' + esc(f.channel || "stable") +
                (f.pin_version ? " · " + esc(f.pin_version) : "") + ')</span></span>' +
              '<span class="k">Processed</span><span>' + esc(s.processed != null ? s.processed : "?") +
                ' (' + esc(s.errors != null ? s.errors : "?") + ' errors)</span>' +
              '<span class="k">Cycles</span><span>' + esc(s.cycle_count != null ? s.cycle_count : "?") + '</span>' +
              '<span class="k">Platform</span><span>' + esc(s.platform || "?") + '</span>' +
              (s.repo ? '<span class="k">Repo</span><span><a href="https://github.com/' + esc(s.repo) +
                '" target="_blank" rel="noopener">' + esc(s.repo) + '</a></span>' : '') +
            '</div>' +
            '<div class="dirs"><div class="muted" style="margin-bottom:0.2rem">Watch directories</div>' + dirs + '</div>' +
            '<div class="actions">' +
              '<button class="mini" onclick="sendCommand(\'' + slug + '\',\'pause\')">Pause</button>' +
              '<button class="mini" onclick="sendCommand(\'' + slug + '\',\'resume\')">Resume</button>' +
              '<button class="mini" onclick="sendCommand(\'' + slug + '\',\'run-once\')">Run once</button>' +
              '<button class="mini" onclick="sendCommand(\'' + slug + '\',\'update-now\')">Update</button>' +
              '<button class="mini" onclick="sendCommand(\'' + slug + '\',\'restart\')">Restart</button>' +
            '</div>' +
            '<div class="actions">' +
              '<select id="ch-' + slug + '" class="mini-select">' + chOptions + '</select>' +
              '<button class="mini secondary" onclick="setChannel(\'' + slug + '\')">Set channel</button>' +
              '<button class="mini secondary" onclick="toggleAudit(\'' + slug + '\')">Audit</button>' +
              '<button class="mini danger" onclick="revoke(\'' + slug + '\',true)">Revoke</button>' +
              '<button class="mini secondary" onclick="revoke(\'' + slug + '\',false)">Restore</button>' +
            '</div>' +
            '<div id="audit-' + slug + '" class="audit" style="display:none"></div>' +
          '</div>';
      }).join("");

      content.innerHTML = '<div class="grid">' + cards + '</div>';
    }

    document.getElementById("auto").addEventListener("change", scheduleRefresh);

    // Resume an existing session without re-authorizing.
    if (userToken) showDashboard();
  </script>
</body>
</html>
